<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Agenda</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin: 5px;
    }

    button {
      background: #a35c98;
      color: white;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #914bca;
    }

    #calendar {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    .fc-event {
      border-radius: 8px;
      padding: 3px;
      font-weight: 500;
    }

    .fc-toolbar-title {
      font-size: 1.5em;
      font-weight: bold;
    }

    .fc-button {
      background-color: #b484e5 !important;
      border: none !important;
      border-radius: 6px !important;
    }

    .fc-button:hover {
      background-color: #45a049 !important;
    }

    /* MODAL */
   .modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6); /* fondo oscuro */
  
  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 9999; 
}

.modal-content {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 300px;
  text-align: center;

  z-index: 10000; 
}
  </style>
</head>

<body>

<h1>📅 Mi Agenda</h1>

<button onclick="logout()">Cerrar sesión</button>

<div id="calendar"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Nuevo Evento</h3>
    <input type="text" id="modalTitulo" placeholder="Título">
    <input type="color" id="modalColor" value="#3788d8">
    <button onclick="guardarDesdeModal()">Guardar</button>
    <button onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script>
const usuario = localStorage.getItem("usuarioActivo");

// Protección
if (!usuario) {
  window.location.href = "login.html";
}

let calendar;
let fechaSeleccionada = "";

// Inicializar calendario
document.addEventListener('DOMContentLoaded', function () {
  const calendarEl = document.getElementById('calendar');

  calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',

    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,timeGridDay'
    },

    events: (JSON.parse(localStorage.getItem("eventos")) || [])
      .filter(e => e.user === usuario),

    // Click → abrir modal
    dateClick: function(info) {
      fechaSeleccionada = info.dateStr;
      document.getElementById("modal").style.display = "flex";
    },

    // Eliminar con clic
    eventClick: function(info) {
      if (confirm("¿Eliminar evento?")) {
        info.event.remove();

        let eventos = JSON.parse(localStorage.getItem("eventos")) || [];
        eventos = eventos.filter(e => e.id != info.event.id);

        localStorage.setItem("eventos", JSON.stringify(eventos));
      }
    }
  });

  calendar.render();
});

// Guardar desde modal
function guardarDesdeModal() {
  const texto = document.getElementById("modalTitulo").value;
  const color = document.getElementById("modalColor").value;

  if (!texto) {
    alert("Escribe un título");
    return;
  }

  if (!fechaSeleccionada) {
    alert("Error: no hay fecha seleccionada");
    return;
  }

  const evento = {
    id: Date.now(),
    user: usuario,
    title: texto,
    start: fechaSeleccionada,
    color: color
  };

  let eventos = JSON.parse(localStorage.getItem("eventos")) || [];
  eventos.push(evento);
  localStorage.setItem("eventos", JSON.stringify(eventos));

  console.log("Evento guardado:", evento); 

  calendar.addEvent(evento);

  cerrarModal();
}

// ❌ Cerrar modal
function cerrarModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("modalTitulo").value = "";
}

// 🚪 Logout
function logout() {
  localStorage.removeItem("usuarioActivo");
  window.location.href = "login.html";
}
</script>

</body>
</html>
